name: SPARQL Queries Nightly
on: [workflow_dispatch]

jobs:
  generate-data:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          pak::local_install_dev_deps(upgrade = TRUE)
          pak::pkg_install("stringr")
          pak::pkg_install("jsonlite")
          pak::pkg_install("readr")
          pak::pkg_install("dplyr")
        shell: Rscript {0}

      - name: SPARQL
        run: Rscript R/nightly.R

      - name: Commit files
        run: |
          git config --local user.email "jacobmgreer@gmail.com"
          git config --local user.name "Jacob Greer"
          git add --all
          git commit -am "add data"
          git push 
      
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2.0.6
